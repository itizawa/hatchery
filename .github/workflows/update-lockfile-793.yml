name: Update pnpm lockfile for issue-793
# This is a temporary workflow to regenerate pnpm-lock.yaml after
# @types/node was bumped from ^22 to ^26 in the root package.json.
# It will be deleted after the lockfile is committed.

on:
  workflow_dispatch:

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Regenerate lock file with @types/node@26
        run: pnpm install --no-frozen-lockfile

      - name: Commit updated pnpm-lock.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git diff --staged --quiet || git commit -m "config: pnpm-lock.yaml を @types/node@26 対応に更新する"
          git push
