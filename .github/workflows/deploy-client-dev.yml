name: Deploy Client (dev)

# develop マージをトリガーに client（Vite SPA）を Cloudflare Pages（dev 環境）へ自動デプロイする。
# VITE_API_BASE_URL は GitHub Actions の Repository Variable（CLOUD_RUN_DEV_URL）から渡す。
# ゲート1: develop への push のみトリガー。main への push は含まない。
on:
  push:
    branches: [develop]

concurrency:
  group: deploy-client-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client
        env:
          VITE_API_BASE_URL: ${{ vars.CLOUD_RUN_DEV_URL }}
        run: pnpm turbo run build --filter=@hatchery/client

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy client/dist/web --project-name=hatchery
