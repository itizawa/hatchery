name: Release Tag

# develop → main の昇格 PR がマージされた直後にタグと GitHub Release を自動作成する。
# Dark Factory ゲート1: develop→main のマージは人間が行う。本ワークフローはその後処理のみ。
on:
  pull_request:
    types: [closed]
    branches: [main]

# タグ・ Release 作成に必要な最小権限のみ付与。
permissions:
  contents: write

jobs:
  release-tag:
    # develop → main の実際のマージ時のみ実行（他ブランチからの PR や closed-but-not-merged はスキップ）
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create git tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail

          # PR タイトルから vX.Y.Z 形式のバージョンを抜出する。
          version=$(echo "$PR_TITLE" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)

          if [ -z "$version" ]; then
            echo "PR タイトルからバージョン(vX.Y.Z)を抜出できませんでした。スキップします。タイトル: ${PR_TITLE}"
            exit 0
          fi

          # 同名タグがリモートに既に存在する場合はスキップ（冪等）。
          # git tag はローカル値のみなのでリモートを直接冗する。
          if git ls-remote --tags origin "refs/tags/${version}" | grep -q "."; then
            echo "タグ ${version} はリモートに既に存在します。スキップします（冪等）。"
            exit 0
          fi

          # 前タグを取得してリリースノートの範囲を決める。
          prev_tag=$(git describe --tags --abbrev=0 "${MERGE_SHA}^" 2>/dev/null || true)

          if [ -n "$prev_tag" ]; then
            commit_range="${prev_tag}..${MERGE_SHA}"
          else
            # 前タグ無しの場合はマージコミットの㇂1親コミット（main側前回）を基点にして
            # このリリース分のコミットのみを表示する。
            commit_range="${MERGE_SHA}^1..${MERGE_SHA}"
          fi

          release_notes=$(git log --no-merges --pretty=format:'- %s (%h)' "$commit_range")

          # git タグを作成してプッシュする。
          # リモートチェック後に並行実行でタグが作成された場合は冪等スキップする。
          git tag "$version" "$MERGE_SHA"
          if ! git push origin "$version"; then
            echo "タグ ${version} の push に失敗しました。並行実行で作成済みの延備があります。スキップします。"
            exit 0
          fi

          # GitHub Release を作成する。
          # フォールバックとしてコミット羅列ノートを設定する。AI 生成が成功した場合は次ステップで上書きされる。
          gh release create "$version" \
            --title "Release ${version}" \
            --notes "$(printf '## リリースノート\n\n%s\n' "$release_notes")"

          echo "タグ ${version} と GitHub Release を作成しました。"

          # 後続ステップで AI リリースノートを生成するため、コミット行を環境変数に書き出す。
          {
            echo "RELEASE_VERSION=${version}"
            # 複数行の値は GITHUB_ENV の heredoc 記法で渡す。
            echo "COMMIT_LINES<<EOF_COMMITS"
            echo "$release_notes"
            echo "EOF_COMMITS"
          } >> "$GITHUB_ENV"

      # AI リリースノート生成に必要な Node.js・pnpm を他ワークフローと同じ方法でセットアップする。
      # タグ・ Release 作成ステップと分けることで、セットアップ失敗がリリース作成に影響しない。
      - name: Setup pnpm
        continue-on-error: true
        uses: pnpm/action-setup@v6

      - name: Setup Node
        continue-on-error: true
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Generate AI release notes
        # AI 生成の失敗でリリース自体を壊さない（フォールバック: コミット羅列ノートを保持）。
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail

          # バージョンが取得できていない場合（前ステップでスキップされた等）はスキップ。
          if [ -z "${RELEASE_VERSION:-}" ]; then
            echo "RELEASE_VERSION が未設定のためリリースノート生成をスキップします。"
            exit 0
          fi

          # ANTHROPIC_API_KEY が設定されていない場合はスキップ（フォールバック維持）。
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY が未設定のためリリースノート生成をスキップします。"
            exit 0
          fi

          # 依存インストール（common を含む server のみ）。
          pnpm install --filter @hatchery/server... --frozen-lockfile

          # common をビルドして server から利用可能にする。
          pnpm --filter @hatchery/common build

          # コミット行を配列として渡す（各行を --commits 引数に）。
          # mapfile で改行区切りの COMMIT_LINES を配列化する。
          mapfile -t commit_args <<< "${COMMIT_LINES:-}"

          # AI リリースノートを生成して stdout のみを受け取る。
          # pnpm --silent でスクリプト実行バナー（> pkg@ver script /path 等）の stdout 出力を抑制する。
          # バナーが混入すると GitHub Markdown で blockquote として描画されるため必須（#735）。
          # 生成に失敗した場合は exit 1 となり continue-on-error が拾う。
          ai_notes=$(pnpm --silent --filter @hatchery/server release-notes \
            --version "${RELEASE_VERSION}" \
            --commits "${commit_args[@]+"${commit_args[@]}"}") || {
            echo "AI リリースノートの生成に失敗しました。コミット羅列ノートを保持します。"
            exit 1
          }

          # GitHub Release 本文を AI 生成ノートで上書きする。
          gh release edit "${RELEASE_VERSION}" --notes "${ai_notes}"
          echo "AI リリースノートで GitHub Release を更新しました（バージョン: ${RELEASE_VERSION}）。"
