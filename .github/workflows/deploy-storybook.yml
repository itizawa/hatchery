name: Deploy Storybook to GitHub Pages

# develop へ push（= develop マージ）されたとき、Storybook を GitHub Pages へデプロイする。
# GitHub Pages の公開設定（Settings → Pages の Source）は人間が行う必要がある。
on:
  push:
    branches:
      - develop

# actions/deploy-pages が必要とする権限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # ビルドジョブは同一ブランチの古い実行をキャンセルして効率化する
    concurrency:
      group: pages-build-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @hatchery/docs#storybook:build は common#build のみに依存（server チェーンを回避）
      # Storybook は viteFinal エイリアスで client/common をソースから直接解決する
      - name: Build Storybook
        run: pnpm turbo run storybook:build

      # storybook-static/ を Pages アーティファクトとしてアップロード
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/storybook-static

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # デプロイジョブは直列化するが実行中のデプロイはキャンセルしない
    # （GitHub Pages デプロイを中断するとサイトが壊れた状態になる可能性があるため）
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
