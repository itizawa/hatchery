name: Fix pnpm-lock.yaml for issue-186

on:
  workflow_dispatch:

jobs:
  fix-lockfile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/issue-186
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Reset pnpm-lock.yaml to develop version first
        run: |
          git fetch origin develop
          git checkout origin/develop -- pnpm-lock.yaml
          echo "Reset pnpm-lock.yaml from develop:"
          wc -l pnpm-lock.yaml

      - name: Regenerate pnpm-lock.yaml with new dependencies
        run: pnpm install --lockfile-only --no-frozen-lockfile --engine-strict=false

      - name: Show lockfile stats
        run: |
          echo "Lines in pnpm-lock.yaml:"
          wc -l pnpm-lock.yaml
          echo "connect-pg-simple entries:"
          grep -c 'connect-pg-simple' pnpm-lock.yaml || true
          echo "pg entries:"
          grep -c "'pg'" pnpm-lock.yaml || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git diff --staged --stat
          git commit -m "fix: pnpm-lock.yaml を connect-pg-simple / pg 追加後の状態に更新する (#186)"
          git push origin feature/issue-186
