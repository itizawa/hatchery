name: Run Batch (Scene Generation)

# 定時起動は Cloud Scheduler + Cloud Run Jobs に移行済み（ADR-0028）。
# このワークフローは緊急時の手動実行のみを目的として残す。
# 通常のバッチ実行: gcloud run jobs execute hatchery-batch --region=<REGION>
# セットアップ手順: docs/cloud-run-batch-setup.md
on:
  workflow_dispatch:

concurrency:
  group: run-batch
  cancel-in-progress: false  # 同時実行をキューに積まず完了を待つ（slot_key ガードと二重写し防止）

jobs:
  batch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm turbo run build --filter=@hatchery/server

      - name: Run community batch
        run: pnpm --filter @hatchery/server batch
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
